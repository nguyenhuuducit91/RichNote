<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="RichNote">
  <defs>
    <linearGradient id="rnBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b93f6"/>
      <stop offset="1" stop-color="#2f6fdb"/>
    </linearGradient>
    <filter id="rnShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#0b2a63" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App badge -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#rnBg)"/>

  <!-- Note sheet -->
  <g filter="url(#rnShadow)">
    <rect x="15" y="12" width="34" height="40" rx="5" fill="#ffffff"/>
  </g>

  <!-- Heading bar (accent) -->
  <rect x="21" y="19" width="18" height="4.4" rx="2.2" fill="#2f6fdb"/>
  <!-- Body text lines -->
  <rect x="21" y="28.5" width="22" height="2.8" rx="1.4" fill="#c9d6ec"/>
  <rect x="21" y="34.5" width="22" height="2.8" rx="1.4" fill="#c9d6ec"/>
  <rect x="21" y="40.5" width="14" height="2.8" rx="1.4" fill="#c9d6ec"/>

  <!-- Pen nib (rich editing) -->
  <g transform="translate(37.5 33) rotate(45)">
    <rect x="-3.1" y="-9.5" width="6.2" height="15" rx="3.1" fill="#f4b740"/>
    <polygon points="-3.1,4.5 3.1,4.5 0,9.6" fill="#e8952a"/>
    <rect x="-0.7" y="-9.5" width="1.4" height="13" fill="#e8952a" opacity="0.55"/>
  </g>
</svg>
